version: 2

sources:
  - name: raw
    description: >
      Raw ingestion layer — written by src/ingestion/loader.py and
      scripts/seed_historical_data.py. Never modified by dbt.
    schema: raw
    tables:
      - name: engagement_events
        description: >
          One row per (video_id, hours_since_post) hourly snapshot.
          Contains cumulative engagement counts, rates, and hourly deltas.
          Populated by the synthetic data generator (Phase 2).
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 72, period: hour}
        loaded_at_field: snapshot_at
        columns:
          - name: event_id
            description: "Unique dedup key: evt_{date}_{video_id}_h{hour:02d}"
            tests:
              - unique
              - not_null
          - name: video_id
            tests:
              - not_null
          - name: hours_since_post
            description: "0-indexed hour since the video was posted"
            tests:
              - not_null
          - name: platform
            tests:
              - not_null
              - accepted_values:
                  values: ['tiktok', 'instagram', 'youtube']
          - name: creator_tier
            tests:
              - not_null
              - accepted_values:
                  values: ['nano', 'micro', 'mid', 'macro', 'mega']
          - name: view_count
            tests:
              - not_null
          - name: demand_lift_24h
            description: >
              Actual demand multiplier vs baseline, observed 24h after posting.
              Null during real-time inference; populated only in historical data.

      - name: sku_catalog
        description: "Product catalog — 50 SKUs across 8 categories."
        columns:
          - name: sku_id
            tests:
              - unique
              - not_null
          - name: baseline_daily_demand
            tests:
              - not_null
          - name: viral_sensitivity
            description: "0.0–5.0; how strongly this SKU amplifies viral-driven demand"

      - name: video_metadata
        description: "One row per video — static metadata that does not change over time."
        columns:
          - name: video_id
            tests:
              - unique
              - not_null
          - name: platform
            tests:
              - not_null

      - name: video_sku_bridge
        description: "Normalised video–SKU mapping (one row per tagged pair)."
        columns:
          - name: video_id
            tests:
              - not_null
          - name: sku_id
            tests:
              - not_null

      - name: agent_alerts
        description: >
          Alert queue written by the LangGraph action agent (Phase 5).
          dbt provides a mart view over this table; dbt does NOT own inserts.
        columns:
          - name: alert_id
            tests:
              - unique
              - not_null
