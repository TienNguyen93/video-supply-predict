name: 'serene_hypatia'
version: '1.0.0'
config-version: 2

profile: 'serene_hypatia'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# -----------------------------------------------------------------------
# Global model defaults
# -----------------------------------------------------------------------
models:
  serene_hypatia:
    +on_schema_change: sync_all_columns

    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: table
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts

# -----------------------------------------------------------------------
# Source freshness thresholds
# -----------------------------------------------------------------------
sources:
  serene_hypatia:
    +schema: raw

# -----------------------------------------------------------------------
# Test severity overrides
# -----------------------------------------------------------------------
tests:
  +severity: warn        # downgrade to warn in dev; CI promotes to error
  unique:
    +severity: error
  not_null:
    +severity: error
